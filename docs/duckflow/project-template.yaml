# Full-fidelity project YAML template.
# This is the AI interchange format for the app.
#
# Conventions:
# - Use one full file, or split the same shape across multiple files and load them with
#   merge_mode = append | intersection | replace.
# - Every split file should keep the same top-level "project" metadata block and include only
#   the sections it owns.
# - Group / subgroup / tag notes are stored in project.group_notes.
# - Table profiling, snapshots, keep/drop selections, related files, and typed edges are all part
#   of the persisted project model.
