openapi: 3.1.0
info:
  title: NYC Real Estate Local API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Liveness check
      operationId: getHealth
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
  /api/listings/summary:
    get:
      summary: Dashboard listing summary
      operationId: getListingsSummary
      responses:
        "200":
          description: Listings summary payload
          content:
            application/json:
              schema:
                type: object
                required:
                  - active_listings
                  - pending_listings
                  - closed_last_30_days
                  - updated_at
                properties:
                  active_listings:
                    type: integer
                  pending_listings:
                    type: integer
                  closed_last_30_days:
                    type: integer
                  updated_at:
                    type: string
                    format: date-time
